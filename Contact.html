<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#000c0f,#001f24);
    color:white;
    min-height:100vh;
}

header{
    width:100%;
    background:#01181d;
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#00e5ff;
}

nav ul{
    list-style:none;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

nav ul li a{
    text-decoration:none;
    color:white;
    padding:8px 14px;
    border-radius:5px;
    transition:0.3s;
}

nav ul li a:hover,
nav ul li a.active{
    background:#00acc1;
}

.section{
    padding:60px 20px;
    width:100%;
}

.section h2{
    text-align:center;
    color:#00e5ff;
    margin-bottom:30px;
    font-size:32px;
}

.card{
    width:100%;
    max-width:550px;
    margin:auto;
    background:rgba(0,172,193,0.12);
    border:1px solid #00acc1;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    padding:30px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    box-shadow:0 0 30px rgba(0,255,255,0.5);
    transform:translateY(-5px);
}

.info p{
    margin:12px 0;
    font-size:16px;
    line-height:1.5;
    word-break:break-word;
}

.info i{
    color:#00e5ff;
    margin-right:10px;
}

form{
    margin-top:25px;
    display:flex;
    flex-direction:column;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    background:#012a30;
    color:white;
    font-size:15px;
    outline:none;
}

input:focus,
textarea:focus{
    box-shadow:0 0 10px #00e5ff;
}

textarea{
    resize:none;
}

button{
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#00acc1;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00e5ff;
    box-shadow:0 0 15px #00e5ff;
}

.success{
    display:none;
    color:#00e676;
    margin-top:10px;
    text-align:center;
}

footer{
    text-align:center;
    padding:20px;
    background:#01181d;
    margin-top:40px;
}

@media(max-width:768px){
    header{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

    nav ul{
        justify-content:center;
    }

    .section h2{
        font-size:28px;
    }

    .card{
        padding:25px;
    }
}

@media(max-width:480px){
    .logo{
        font-size:20px;
    }

    nav ul{
        flex-direction:column;
        width:100%;
    }

    nav ul li a{
        display:block;
        width:100%;
    }

    .section{
        padding:40px 15px;
    }

    .section h2{
        font-size:24px;
    }

    .card{
        padding:20px;
    }

    input,
    textarea,
    button{
        font-size:14px;
    }
}
</style>
</head>

<body>

<header>
<div class="logo">My Portfolio</div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="AboutMe.html">About Me</a></li>
<li><a href="Projects.html">Projects</a></li>
<li><a href="Contact.html" class="active">Contact</a></li>
</ul>
</nav>
</header>

<section class="section">
<h2>Contact Me</h2>

<div class="card">

<div class="info">
<p><i class="fas fa-envelope"></i>Email: wennardkurt@gmail.com</p>
<p><i class="fas fa-user"></i>Facebook: Adiwang, Wennard Kurt Pe</p>
<p><i class="fas fa-phone"></i>Phone: 0962-951-5259</p>
<p><i class="fas fa-map-marker-alt"></i>Address: Sta. Maria, Alfonso Lista, Ifugao</p>
</div>

<form id="contact-form">
<input type="text" name="user_name" placeholder="Your Name" required>
<input type="email" name="user_email" placeholder="Your Email" required>
<textarea name="message" rows="4" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
<p class="success" id="success-msg">Message sent successfully!</p>
</form>

</div>
</section>

<footer>
<p>wennardkurt@gmail.com</p>
</footer>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

document.getElementById("contact-form").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",this)
.then(function(){
document.getElementById("success-msg").style.display="block";
document.getElementById("contact-form").reset();
}, function(error){
alert("Failed to send message");
});
});
</script>

</body>
</html>
